name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch / PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        # requirements.txt 在 scrape_new/ 子包下,不在仓库根。
        # 安装生产 + 可选依赖,CI 只验证不会真正下载真实网络课程。
        run: |
          pip install -r scrape_new/requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m compileall -q scrape_new

      - name: Run tests
        # 全部本地 fixture / mock,无网络课程访问。
        run: python -m pytest scrape_new/tests -q
